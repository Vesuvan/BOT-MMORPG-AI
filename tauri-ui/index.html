<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BOT MMORPG AI</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; }
    button { padding: 10px 14px; margin-right: 10px; }
    pre { background: #111; color: #ddd; padding: 12px; border-radius: 8px; overflow: auto; }
    .row { margin: 12px 0; }
    .tag { display:inline-block; padding:2px 8px; border-radius: 999px; background:#eee; margin-left:8px; font-size:12px; }
  </style>
</head>
<body>
  <h1>BOT MMORPG AI</h1>
  <div class="row">
    Backend: <span id="backend" class="tag">starting…</span>
    Drivers: <span id="drivers" class="tag">unknown</span>
  </div>

  <div class="row">
    <button id="btnInstall">Install/Repair Drivers</button>
    <button id="btnCollect">Collect</button>
    <button id="btnTrain">Train</button>
    <button id="btnPlay">Play</button>
  </div>

  <h3>Output</h3>
  <pre id="out"></pre>

  <script type="module" src="./main.js"></script>
</body>
</html>
