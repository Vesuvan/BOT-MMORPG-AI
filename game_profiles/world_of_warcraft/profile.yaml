# World of Warcraft Profile
# Optimized settings for WoW's tab-target combat and UI

game:
  id: "world_of_warcraft"
  name: "World of Warcraft"
  publisher: "Blizzard Entertainment"

display:
  typical_resolution: [1920, 1080]
  ui_scale_range: [0.64, 1.15]
  important_regions:
    health_bar: [0.02, 0.02, 0.12, 0.06]
    target_frame: [0.14, 0.02, 0.12, 0.06]
    action_bar: [0.25, 0.92, 0.50, 0.07]
    minimap: [0.84, 0.01, 0.15, 0.22]
    center_focus: [0.30, 0.25, 0.40, 0.50]

input:
  action_space: "discrete"
  num_actions: 14
  requires_mouse: true
  mouse_precision: "low"
  default_bindings:
    - {key: "1", action: "ability_1"}
    - {key: "2", action: "ability_2"}
    - {key: "3", action: "ability_3"}
    - {key: "4", action: "ability_4"}
    - {key: "5", action: "ability_5"}
    - {key: "6", action: "ability_6"}
    - {key: "W", action: "move_forward"}
    - {key: "A", action: "strafe_left"}
    - {key: "S", action: "move_back"}
    - {key: "D", action: "strafe_right"}
    - {key: "SPACE", action: "jump"}
    - {key: "TAB", action: "target_next"}
    - {key: "Q", action: "ability_7"}
    - {key: "E", action: "ability_8"}

training:
  recommended_architecture: "efficientnet_lstm"
  recommended_input_size: [224, 224]
  temporal_frames: 4
  minimum_samples: 6000
  class_balance_tolerance: 0.25
  learning_rate:
    initial: 0.0008
    decay_factor: 0.1
    decay_epochs: [25, 45]

hardware_tiers:
  low:
    architecture: "mobilenetv3"
    batch_size: 8
    input_size: [160, 160]
    temporal_frames: 0
    workers: 2
  medium:
    architecture: "efficientnet_simple"
    batch_size: 16
    input_size: [224, 224]
    temporal_frames: 2
    workers: 4
  high:
    architecture: "efficientnet_lstm"
    batch_size: 32
    input_size: [224, 224]
    temporal_frames: 4
    workers: 8

tasks:
  combat:
    description: "Tab-target rotation and cooldown management"
    priority: "reaction_time"
    temporal: true
    recommended_architecture: "efficientnet_lstm"
    augmentation: [brightness, contrast]
    fps_target: 30
  farming:
    description: "Herb/mining node gathering"
    priority: "accuracy"
    temporal: false
    recommended_architecture: "mobilenetv3"
    augmentation: [rotation, brightness, color_jitter]
    fps_target: 15
  dungeon:
    description: "Dungeon mechanics and boss fights"
    priority: "reaction_time"
    temporal: true
    recommended_architecture: "efficientnet_lstm"
    augmentation: [brightness, contrast, noise]
    fps_target: 30
