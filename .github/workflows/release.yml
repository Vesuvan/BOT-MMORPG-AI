name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: BOT MMORPG AI ${{ steps.get_version.outputs.version }}
          body: |
            ## BOT MMORPG AI ${{ steps.get_version.outputs.version }}

            ### Installation Instructions

            1. **Download the installer** for your platform below
            2. **Run the installer** with administrator privileges
            3. **Follow the setup wizard** - it will automatically install required drivers
            4. **Launch the application** from your desktop or start menu

            ### What's Included

            - ✅ AI Bot Application with GUI
            - ✅ Python Backend (bundled)
            - ✅ Automatic Driver Installation (Interception + vJoy)
            - ✅ Desktop & Start Menu Shortcuts
            - ✅ Easy Uninstaller

            ### System Requirements

            - **OS**: Windows 10/11 (64-bit)
            - **RAM**: 8GB minimum, 16GB recommended
            - **GPU**: NVIDIA GPU recommended for training
            - **Disk**: 5GB free space

            ### Quick Start

            1. Launch the application
            2. Click "Collect Data" and play your game for 10-15 minutes
            3. Click "Train Model" and wait for training to complete
            4. Click "Start Bot" to let the AI play!

            For detailed instructions, see the [User Guide](https://github.com/${{ github.repository }}/blob/main/USAGE.md).

            ### Support

            - 📖 [Documentation](https://github.com/${{ github.repository }})
            - 🐛 [Report Issues](https://github.com/${{ github.repository }}/issues)
            - 💬 [Slack Community](https://ruslanmv.slack.com/archives/C0A5N63DKSS)

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v0.1.4...${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false

  build-windows-installer:
    name: Build Windows Installer for Release
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.0"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pyinstaller
          pip install -e .

      - name: Build installer
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build_pipeline.ps1

      - name: Get installer name
        id: installer
        run: |
          $installer = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe" | Select-Object -First 1
          $installerName = $installer.Name
          $installerPath = $installer.FullName
          echo "name=$installerName" >> $env:GITHUB_OUTPUT
          echo "path=$installerPath" >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $installerName"
        shell: pwsh

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.installer.outputs.path }}
          asset_name: BOT-MMORPG-AI-${{ needs.create-release.outputs.version }}-Windows-Installer.exe
          asset_content_type: application/octet-stream

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-installer-${{ needs.create-release.outputs.version }}
          path: ${{ steps.installer.outputs.path }}
          retention-days: 90
