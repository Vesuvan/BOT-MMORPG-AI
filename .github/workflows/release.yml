name: Release (Legacy)

on:
  # Tag-triggered releases are handled by release-windows-installer.yml
  # This workflow is kept for manual/dispatch use only
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ============================================
  # Run Tests Before Release
  # ============================================
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
          uv pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ============================================
  # Build Windows Installer (Tauri + NSIS)
  # ============================================
  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.0"

      - name: Install Python dependencies
        run: |
          pip install uv
          pip install -e ".[launcher,backend]"
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Prepare build directories
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/python" | Out-Null
          New-Item -ItemType Directory -Force -Path "src-tauri/drivers/interception" | Out-Null
          New-Item -ItemType Directory -Force -Path "src-tauri/drivers/vjoy" | Out-Null
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/scripts" | Out-Null
        shell: pwsh

      - name: Download embedded Python
        run: |
          $ver = "3.10.11"
          $arch = "amd64"
          $zipName = "python-$ver-embed-$arch.zip"
          $url = "https://www.python.org/ftp/python/$ver/$zipName"
          $dst = "src-tauri/resources/python"

          Invoke-WebRequest -Uri $url -OutFile $zipName
          Expand-Archive -Path $zipName -DestinationPath $dst -Force
          Remove-Item $zipName

          # Patch python._pth for site-packages
          $pth = Get-ChildItem -Path $dst -Filter "python*._pth" | Select-Object -First 1
          if ($pth) {
            $content = Get-Content $pth.FullName
            $content += ".\site-packages"
            $content += "import site"
            Set-Content -Path $pth.FullName -Value $content
          }
        shell: pwsh

      - name: Install Python packages to embedded runtime
        run: |
          $sitePkgs = "src-tauri/resources/python/site-packages"
          New-Item -ItemType Directory -Force -Path $sitePkgs | Out-Null

          pip install --target $sitePkgs `
            numpy pandas opencv-python pillow mss pynput `
            torch torchvision timm `
            fastapi uvicorn eel `
            --index-url https://download.pytorch.org/whl/cpu `
            --extra-index-url https://pypi.org/simple/
        shell: pwsh
        continue-on-error: true

      - name: Copy scripts
        run: |
          if (Test-Path "scripts/install_drivers.ps1") {
            Copy-Item "scripts/install_drivers.ps1" "src-tauri/resources/scripts/" -Force
          }
          if (Test-Path "scripts/download_models.ps1") {
            Copy-Item "scripts/download_models.ps1" "src-tauri/resources/scripts/" -Force
          }
        shell: pwsh

      - name: Build Tauri application
        run: |
          cd src-tauri
          cargo tauri build
        shell: pwsh
        continue-on-error: true

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ============================================
  # Build Python Package
  # ============================================
  build-package:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build twine hatchling

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows-installer, build-package]
    if: always() && needs.build-package.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: BOT-MMORPG-AI v${{ steps.version.outputs.version }}
          draft: true
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
