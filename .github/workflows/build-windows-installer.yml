name: Build Windows Installer

on:
  push:
    branches: [ main, develop, claude/** ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.0"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pyinstaller
          pip install -e .

      - name: Verify driver installers exist
        run: |
          $interceptionPath = "frontend/input_record/install-interception.exe"
          $vjoyPath = "versions/0.01/pyvjoy/vJoySetup.exe"

          if (-not (Test-Path $interceptionPath)) {
            Write-Host "::warning::Interception installer not found at $interceptionPath"
            Write-Host "Creating placeholder for build..."
            New-Item -Force -ItemType Directory (Split-Path $interceptionPath -Parent) | Out-Null
            # Create a minimal placeholder exe for CI build
            Set-Content -Path $interceptionPath -Value "Placeholder" -NoNewline
          }

          if (-not (Test-Path $vjoyPath)) {
            Write-Host "::warning::vJoy installer not found at $vjoyPath"
            Write-Host "Creating placeholder for build..."
            New-Item -Force -ItemType Directory (Split-Path $vjoyPath -Parent) | Out-Null
            # Create a minimal placeholder exe for CI build
            Set-Content -Path $vjoyPath -Value "Placeholder" -NoNewline
          }
        shell: pwsh

      - name: Build Python backend sidecar
        run: |
          Write-Host "Building Python backend with PyInstaller..."
          pyinstaller --noconfirm --clean --onefile --name main-backend backend/main_backend.py

          if (-not (Test-Path "dist/main-backend.exe")) {
            Write-Error "PyInstaller failed to create main-backend.exe"
            exit 1
          }

          Write-Host "✓ Backend sidecar built successfully"
        shell: pwsh

      - name: Prepare Tauri sidecar binary
        run: |
          $target = "x86_64-pc-windows-msvc"
          $tauriSidecar = "src-tauri/binaries/main-backend-$target.exe"

          New-Item -Force -ItemType Directory (Split-Path $tauriSidecar -Parent) | Out-Null
          Copy-Item -Force "dist/main-backend.exe" $tauriSidecar

          Write-Host "✓ Sidecar copied to: $tauriSidecar"
          Write-Host "File size: $((Get-Item $tauriSidecar).Length / 1MB) MB"
        shell: pwsh

      - name: Copy driver installers
        run: |
          # Create directories
          New-Item -Force -ItemType Directory "src-tauri/drivers/interception" | Out-Null
          New-Item -Force -ItemType Directory "src-tauri/drivers/vjoy" | Out-Null
          New-Item -Force -ItemType Directory "src-tauri/resources/scripts" | Out-Null

          # Copy driver installers
          Copy-Item -Force "frontend/input_record/install-interception.exe" "src-tauri/drivers/interception/install-interception.exe"
          Copy-Item -Force "versions/0.01/pyvjoy/vJoySetup.exe" "src-tauri/drivers/vjoy/vJoySetup.exe"

          # Copy PowerShell installer script
          Copy-Item -Force "scripts/install_drivers.ps1" "src-tauri/resources/scripts/install_drivers.ps1"

          Write-Host "✓ Driver installers and scripts copied"
        shell: pwsh

      - name: Build Tauri application
        run: |
          Push-Location src-tauri
          try {
            cargo tauri build --verbose
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Tauri build failed with exit code $LASTEXITCODE"
              exit 1
            }
          } finally {
            Pop-Location
          }
        shell: pwsh

      - name: Verify installer was created
        run: |
          $installerDir = "src-tauri/target/release/bundle/nsis"

          if (-not (Test-Path $installerDir)) {
            Write-Error "Installer directory not found: $installerDir"
            exit 1
          }

          $installers = Get-ChildItem -Path $installerDir -Filter "*.exe"

          if ($installers.Count -eq 0) {
            Write-Error "No installer executables found in $installerDir"
            exit 1
          }

          Write-Host "`n=== Installer Build Results ==="
          foreach ($installer in $installers) {
            Write-Host "✓ Created: $($installer.Name)"
            Write-Host "  Size: $($installer.Length / 1MB) MB"
            Write-Host "  Path: $($installer.FullName)"
          }
          Write-Host "==============================`n"
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            src-tauri/target/release/build.log
            *.log
          if-no-files-found: ignore
          retention-days: 7

  test-installer:
    name: Test Installer
    needs: build-windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./installer-test

      - name: List downloaded files
        run: |
          Write-Host "Downloaded installer files:"
          Get-ChildItem -Path ./installer-test -Recurse
        shell: pwsh

      - name: Basic installer validation
        run: |
          $installers = Get-ChildItem -Path ./installer-test -Filter "*.exe"

          if ($installers.Count -eq 0) {
            Write-Error "No installer found!"
            exit 1
          }

          foreach ($installer in $installers) {
            Write-Host "Validating: $($installer.Name)"

            # Check file size (should be at least 10MB for a real installer)
            if ($installer.Length -lt 1MB) {
              Write-Warning "Installer size is suspiciously small: $($installer.Length / 1MB) MB"
            } else {
              Write-Host "✓ Size check passed: $($installer.Length / 1MB) MB"
            }

            # Check if it's a valid PE executable
            $header = Get-Content -Path $installer.FullName -Encoding Byte -TotalCount 2
            if ($header[0] -eq 0x4D -and $header[1] -eq 0x5A) {
              Write-Host "✓ Valid PE executable header"
            } else {
              Write-Error "Invalid executable header"
              exit 1
            }
          }

          Write-Host "`n✓ All installer validation checks passed!"
        shell: pwsh
